services:
  neo4j:
    image: neo4j:5.18-community
    container_name: her2_neo4j
    ports:
      - "7474:7474"   # Browser UI
      - "7687:7687"   # Bolt
    environment:
      NEO4J_AUTH: neo4j/password
      NEO4J_PLUGINS: '["apoc", "graph-data-science"]'
      NEO4J_dbms_security_procedures_unrestricted: "apoc.*,gds.*"
      NEO4J_dbms_memory_heap_initial__size: "512m"
      NEO4J_dbms_memory_heap_max__size: "2g"
      NEO4J_dbms_memory_pagecache_size: "512m"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - neo4j_import:/var/lib/neo4j/import
    healthcheck:
      test: ["CMD", "neo4j", "status"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: her2_api
    ports:
      - "8000:8000"
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: password
      LLM_MODEL: qwen3:8b
      EMBED_MODEL: nomic-embed-text
      # Ollama host on the Docker host machine:
      OLLAMA_HOST: http://host.docker.internal:11434
    depends_on:
      neo4j:
        condition: service_healthy
    command: uvicorn app.api:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - .:/app
    extra_hosts:
      - "host.docker.internal:host-gateway"

  streamlit:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: her2_dashboard
    ports:
      - "8501:8501"
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: password
      LLM_MODEL: qwen3:8b
      OLLAMA_HOST: http://host.docker.internal:11434
    depends_on:
      neo4j:
        condition: service_healthy
    command: streamlit run app/streamlit_app.py --server.port 8501 --server.address 0.0.0.0
    volumes:
      - .:/app
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  neo4j_data:
  neo4j_logs:
  neo4j_import:
